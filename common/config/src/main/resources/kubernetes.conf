kubernetes {

  enabled = false
  enabled = ${?KUBERNETES_COMPUTING_UNIT_ENABLED}

  compute-unit-pool-name = "texera-workflow-computing-unit"
  compute-unit-pool-name = ${?KUBERNETES_COMPUTE_UNIT_POOL_NAME}

  compute-unit-pool-namespace = "texera-workflow-computing-unit-pool"
  compute-unit-pool-namespace = ${?KUBERNETES_COMPUTE_UNIT_POOL_NAMESPACE}

  compute-unit-service-name = "workflow-computing-unit-svc"
  compute-unit-service-name = ${?KUBERNETES_COMPUTE_UNIT_SERVICE_NAME}

  image-name = "bobbai/texera-workflow-computing-unit:dev"
  image-name = ${?KUBERNETES_IMAGE_NAME}

  image-pull-policy = "Always"
  image-pull-policy = ${?KUBERNETES_IMAGE_PULL_POLICY}

  port-num = 8085

  # Configuration on how many computing units one user can create
  max-num-of-running-computing-units-per-user = 10
  max-num-of-running-computing-units-per-user = ${?MAX_NUM_OF_RUNNING_COMPUTING_UNITS_PER_USER}

  computing-unit-cpu-limit-options = "1,2,4"
  computing-unit-cpu-limit-options = ${?KUBERNETES_COMPUTING_UNIT_CPU_LIMIT_OPTIONS}

  computing-unit-memory-limit-options = "1Gi,2Gi,4Gi"
  computing-unit-memory-limit-options = ${?KUBERNETES_COMPUTING_UNIT_MEMORY_LIMIT_OPTIONS}

  # GPU configuration
  computing-unit-gpu-limit-options = "0,1,2"
  computing-unit-gpu-limit-options = ${?KUBERNETES_COMPUTING_UNIT_GPU_LIMIT_OPTIONS}
  
  # GPU resource key used in Kubernetes (vendor-specific)
  computing-unit-gpu-resource-key = "nvidia.com/gpu"
  computing-unit-gpu-resource-key = ${?KUBERNETES_COMPUTING_UNIT_GPU_RESOURCE_KEY}

  # Node label key used to identify GPU model on each worker node.
  # Admin must label nodes before GPU model selection is available, e.g.:
  #   kubectl label node <node-name> gpu-model=H200
  computing-unit-gpu-node-label-key = "gpu-model"
  computing-unit-gpu-node-label-key = ${?KUBERNETES_COMPUTING_UNIT_GPU_NODE_LABEL_KEY}

  # Per-user persistent storage: each user gets an isolated PVC mounted into their pods.
  # PVCs are created dynamically by the computing unit manager and persist across pod restarts.
  # The storage class must support ReadWriteMany if a user can have multiple pods simultaneously.
  user-storage-enabled = false
  user-storage-enabled = ${?KUBERNETES_USER_STORAGE_ENABLED}

  user-storage-class = "bodleian-dknet-2"
  user-storage-class = ${?KUBERNETES_USER_STORAGE_CLASS}

  user-storage-size = "10Gi"
  user-storage-size = ${?KUBERNETES_USER_STORAGE_SIZE}

  user-storage-mount-path = "/user-data"
  user-storage-mount-path = ${?KUBERNETES_USER_STORAGE_MOUNT_PATH}

  # Comma-separated list of user IDs allowed to have persistent storage.
  # Leave empty to allow all users.
  user-storage-allowed-uids = ""
  user-storage-allowed-uids = ${?KUBERNETES_USER_STORAGE_ALLOWED_UIDS}
}